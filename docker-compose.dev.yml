# Lokale Entwicklung. Ports nur auf localhost.
#
#   docker compose -f docker-compose.dev.yml up --build
#
# Backend:  http://localhost:8000  (FastAPI, --reload)
# Frontend: http://localhost:5173  (Vite, Proxy /api -> backend)

name: tab-dev

services:
  backend:
    build:
      context: ./backend
    container_name: tab-backend-dev
    env_file: .env
    environment:
      DB_PATH: /app/data/tab.db
      UPLOAD_ROOT: /app/uploads
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
      - ./uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    image: node:20-slim
    container_name: tab-frontend-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      VITE_DEV_API_PROXY: http://backend:8000
    command: sh -c "npm install && npm run dev"
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - backend
